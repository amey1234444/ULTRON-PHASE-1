services:
  - type: web
    name: ultron-backend-2
    runtime: python
    rootDir: ./ultron-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SIMULATED
        value: "true"
      - key: HOST
        value: "0.0.0.0"
      - key: BROADCAST_INTERVAL_MS
        value: "100"
      - key: DB_ENABLED
        value: "true"
      - key: DB_PATH
        value: "/opt/render/project/src/data/ultron.db"
      - key: MODBUS_TCP_ENABLED
        value: "false"
      - key: MODBUS_RTU_ENABLED
        value: "false"
      - key: MDNS_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /health
