services:
  - type: web
    name: ultron-backend
    runtime: python
    rootDir: ./ultron-backend
    buildCommand: pip install -r requirements.txt && python -c "import httpx; print('httpx OK')" && python -c "from app.bridge_manager import BridgeManager; print('BridgeManager OK')"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop --http httptools
    plan: free
    envVars:
      - key: SIMULATED
        value: "true"
      - key: HOST
        value: "0.0.0.0"
      - key: BROADCAST_INTERVAL_MS
        value: "100"
      - key: DB_ENABLED
        value: "true"
      - key: DB_PATH
        value: "/app/data/ultron.db"
      - key: MODBUS_TCP_ENABLED
        value: "false"
      - key: MODBUS_RTU_ENABLED
        value: "false"
      - key: MDNS_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
